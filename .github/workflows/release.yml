name: Build Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FLUTTER_CHANNEL: stable

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      app_name: ${{ steps.meta.outputs.app_name }}
      app_version: ${{ steps.meta.outputs.app_version }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package metadata
        id: meta
        shell: bash
        run: |
          app_name="$(grep '^name:' pubspec.yaml | head -n 1 | cut -d':' -f2 | xargs)"
          app_version="$(grep '^version:' pubspec.yaml | head -n 1 | cut -d':' -f2 | xargs)"
          release_name="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            release_name="manual-${GITHUB_RUN_NUMBER}"
          fi
          echo "app_name=${app_name}" >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
          echo "release_name=${release_name}" >> "${GITHUB_OUTPUT}"

  android:
    name: Android
    runs-on: ubuntu-latest
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.app_name }}-android-${{ needs.metadata.outputs.release_name }}
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error

  windows:
    name: Windows x86_64
    runs-on: windows-latest
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Archive Windows package
        shell: pwsh
        run: |
          $artifact = "${{ needs.metadata.outputs.app_name }}-windows-x86_64-${{ needs.metadata.outputs.release_name }}.zip"
          Compress-Archive -Path "build/windows/x64/runner/Release/*" -DestinationPath $artifact -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.app_name }}-windows-x86_64-${{ needs.metadata.outputs.release_name }}
          path: ${{ needs.metadata.outputs.app_name }}-windows-x86_64-${{ needs.metadata.outputs.release_name }}.zip
          if-no-files-found: error

  macos:
    name: macOS arm64
    runs-on: macos-14
    needs: metadata

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS release
        run: flutter build macos --release

      - name: Archive macOS app
        shell: bash
        run: |
          artifact="${{ needs.metadata.outputs.app_name }}-macos-arm64-${{ needs.metadata.outputs.release_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent "build/macos/Build/Products/Release/${{ needs.metadata.outputs.app_name }}.app" "${artifact}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.app_name }}-macos-arm64-${{ needs.metadata.outputs.release_name }}
          path: ${{ needs.metadata.outputs.app_name }}-macos-arm64-${{ needs.metadata.outputs.release_name }}.zip
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-14
    needs: metadata
    env:
      IOS_CERT_BASE64: ${{ secrets.IOS_CERT_BASE64 }}
      IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
      IOS_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
      IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        if: env.IOS_CERT_BASE64 == '' || env.IOS_PROFILE_BASE64 == '' || env.IOS_TEAM_ID == ''
        run: flutter build ios --release --no-codesign

      - name: Archive unsigned iOS app
        if: env.IOS_CERT_BASE64 == '' || env.IOS_PROFILE_BASE64 == '' || env.IOS_TEAM_ID == ''
        shell: bash
        run: |
          artifact="${{ needs.metadata.outputs.app_name }}-ios-unsigned-${{ needs.metadata.outputs.release_name }}.zip"
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphoneos/Runner.app "${artifact}"

      - name: Prepare signing assets
        if: env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' && env.IOS_TEAM_ID != ''
        shell: bash
        run: |
          CERT_PATH="${RUNNER_TEMP}/build_certificate.p12"
          PP_PATH="${RUNNER_TEMP}/build_pp.mobileprovision"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"

          echo -n "${IOS_CERT_BASE64}" | openssl base64 -d -A -out "${CERT_PATH}"
          echo -n "${IOS_PROFILE_BASE64}" | openssl base64 -d -A -out "${PP_PATH}"

          security create-keychain -p "" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${IOS_CERT_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -k "" "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"

          mkdir -p "${HOME}/Library/MobileDevice/Provisioning Profiles"
          cp "${PP_PATH}" "${HOME}/Library/MobileDevice/Provisioning Profiles"

      - name: Build signed IPA
        if: env.IOS_CERT_BASE64 != '' && env.IOS_PROFILE_BASE64 != '' && env.IOS_TEAM_ID != ''
        shell: bash
        run: |
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${IOS_EXPORT_METHOD:-development}</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>thinning</key>
            <string>&lt;none&gt;</string>
          </dict>
          </plist>
          EOF
          flutter build ipa --release --export-options-plist=ExportOptions.plist

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.metadata.outputs.app_name }}-ios-${{ needs.metadata.outputs.release_name }}
          path: |
            ${{ needs.metadata.outputs.app_name }}-ios-unsigned-${{ needs.metadata.outputs.release_name }}.zip
            build/ios/ipa/*.ipa
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - metadata
      - android
      - windows
      - macos
      - ios
    if: github.event_name == 'push' && github.ref_type == 'tag'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-artifacts/**/*
